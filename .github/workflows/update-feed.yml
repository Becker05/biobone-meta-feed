name: Atualizar Feed Meta

on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerar feed CSV
        run: python generate_feed.py

      - name: Verificar se o feed foi gerado
        run: |
          if [ ! -f docs/feed.csv ]; then
            echo "ERRO: feed.csv não foi gerado"
            exit 1
          fi
          echo "Feed gerado com $(wc -l < docs/feed.csv) linhas"

      - name: Commit e push do feed atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.csv
          git diff --staged --quiet || git commit -m "chore: atualiza feed Meta [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
